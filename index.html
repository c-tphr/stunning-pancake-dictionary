<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cídiǎn — Chinese–English Dictionary for Translators</title>
    <script>
      // Resolve the theme before first paint to avoid a light-mode flash.
      // Mirrors the logic in useSettings; keep the two in sync.
      try {
        var s = JSON.parse(localStorage.getItem('cidian.settings.v1') || '{}');
        document.documentElement.dataset.theme =
          s.theme === 'light' || s.theme === 'dark'
            ? s.theme
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
